<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT skyriaus užduočių valdymas</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1D9E75;--pri-lt:#E1F5EE;--pri-dk:#0F6E56;
  --amber:#EF9F27;--amber-lt:#FAEEDA;--amber-dk:#854F0B;
  --red:#E24B4A;--red-lt:#FCEBEB;
  --blue:#378ADD;--blue-lt:#E6F1FB;--blue-dk:#185FA5;
  --bg:#FAFAF8;--bg2:#F1EFE8;--bg3:#fff;
  --text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
  --border:#D3D1C7;--border2:#B4B2A9;
  --radius:8px;--radius-lg:12px;
  --shadow-lg:0 4px 24px rgba(0,0,0,.14);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a18;--bg2:#2C2C2A;--bg3:#232321;--text:#F1EFE8;--text2:#B4B2A9;--text3:#888780;--border:#444441;--border2:#5F5E5A;}
}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
#app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
header{background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem;z-index:20}
header h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
.sub{font-size:12px;color:var(--text3)}
.spacer{flex:1}
.add-btn{background:var(--pri);color:#fff;border:none;padding:7px 16px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500;font-family:inherit;display:flex;align-items:center;gap:5px}
.add-btn:hover{background:var(--pri-dk)}
.main{display:grid;grid-template-columns:196px 1fr;overflow:hidden}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:.75rem 0;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.sb-sec{padding:0 1rem;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 4px}
.nav-item{padding:7px 1rem;font-size:13px;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:8px;border-left:2px solid transparent;transition:all .1s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--pri-lt);color:var(--pri-dk);border-left-color:var(--pri);font-weight:500}
.nav-item svg{width:14px;height:14px;opacity:.55;flex-shrink:0}
.nav-item.active svg{opacity:1}
.sb-filters{padding:0 .75rem;display:flex;flex-direction:column;gap:6px}
.sb-sel{width:100%;font-size:12px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:inherit;cursor:pointer}
.sb-sel:focus{outline:none;border-color:var(--pri)}
.sb-clear{font-size:12px;padding:5px 8px;cursor:pointer;border:1px solid var(--border);border-radius:var(--radius);background:none;color:var(--text3);font-family:inherit;width:100%}
.sb-clear:hover{background:var(--bg3)}
.content{overflow-y:auto;padding:1.25rem 1.5rem}
.tbar{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.tbar input[type=text]{font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-family:inherit;height:30px;width:220px}
.tbar input:focus{outline:none;border-color:var(--pri)}
.task-count{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 9px;cursor:pointer;color:var(--text3);font-size:12px;font-family:inherit;display:flex;align-items:center;gap:4px;height:30px}
.icon-btn:hover{background:var(--bg2);color:var(--text)}
.icon-btn.on{border-color:var(--pri);color:var(--pri-dk);background:var(--pri-lt)}
.table-wrap{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.task-table{width:100%;border-collapse:collapse;font-size:12px}
.task-table thead{position:sticky;top:0;z-index:5}
.task-table th{background:var(--bg2);border-bottom:1px solid var(--border);white-space:nowrap;padding:0;vertical-align:top}
.th-label{padding:7px 12px 5px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:3px;user-select:none}
.th-label:hover{color:var(--text)}
.sort-ic{font-size:9px;opacity:.5}
.th-fi{padding:0 6px 6px}
.cf-sel,.cf-inp{width:100%;font-size:11px;padding:3px 5px;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);font-family:inherit;height:24px}
.cf-sel:focus,.cf-inp:focus{outline:none;border-color:var(--pri)}
.task-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.task-table tr:last-child td{border-bottom:none}
.task-table tbody tr:hover td{background:var(--bg2)}
.task-table tbody tr{cursor:pointer}
.trunc{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap;font-family:'IBM Plex Mono',monospace}
.b-apvis{background:#E6F1FB;color:#185FA5}
.b-naujos{background:#EAF3DE;color:#3B6D11}
.b-esamos{background:#F1EFE8;color:#5F5E5A}
.b-doc{background:#FAEEDA;color:#854F0B}
.b-p10{background:#FCEBEB;color:#A32D2D}
.b-p9{background:#FAEEDA;color:#854F0B}
.b-p8{background:#E6F1FB;color:#185FA5}
.b-p7{background:#EAF3DE;color:#3B6D11}
.b-plow{background:#F1EFE8;color:#5F5E5A}
.spill{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:inherit;white-space:nowrap}
.spill:hover{opacity:.8}
.s-ne{background:#F1EFE8;color:#5F5E5A}
.s-vy{background:#E6F1FB;color:#185FA5}
.s-ba{background:#EAF3DE;color:#3B6D11}
.s-bl{background:#FCEBEB;color:#A32D2D}
.s-la{background:#FAEEDA;color:#854F0B}
.pbar-wrap{width:64px;height:5px;background:var(--bg2);border-radius:3px;display:inline-block;vertical-align:middle}
.pbar{height:5px;border-radius:3px;background:var(--pri)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:300;overflow-y:auto;backdrop-filter:blur(3px)}
.modal{background:var(--bg3);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:700px;box-shadow:var(--shadow-lg)}
.modal-hd{padding:1.25rem 1.5rem .75rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem}
.modal-hd h2{font-size:15px;font-weight:600;line-height:1.4;flex:1}
.nr-chip{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);font-weight:400;display:block;margin-bottom:3px}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);line-height:1;padding:0;flex-shrink:0}
.close-btn:hover{color:var(--text)}
.modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 1.5rem}
.mtab{padding:7px 14px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;font-family:inherit}
.mtab.active{color:var(--pri-dk);border-bottom-color:var(--pri);font-weight:500}
.mtab:hover:not(.active){color:var(--text)}
.modal-body{padding:1.25rem 1.5rem}
.modal-pane{display:none}
.modal-pane.active{display:block}
.fg{margin-bottom:.85rem}
.fg label{display:block;font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--pri)}
.fg textarea{min-height:68px;resize:vertical;line-height:1.5}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-pri{background:var(--pri);color:#fff;border:none;padding:8px 18px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500;font-family:inherit}
.btn-pri:hover{background:var(--pri-dk)}
.btn-sec{background:none;border:1px solid var(--border);padding:8px 18px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit}
.btn-sec:hover{background:var(--bg2)}
.btn-del{background:none;border:1px solid var(--red);padding:8px 18px;border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--red);font-family:inherit}
.btn-del:hover{background:var(--red-lt)}
.modal-ft{display:flex;gap:8px;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-top:1px solid var(--border)}
.mf-r{display:flex;gap:8px}
.cbox{background:var(--bg2);border-radius:var(--radius);padding:9px 12px;margin-bottom:7px}
.cmeta{font-size:10px;color:var(--text3);margin-bottom:3px;font-family:'IBM Plex Mono',monospace}
.ctext{font-size:13px;color:var(--text);line-height:1.5}
.sec-div{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;padding:7px 0 5px;border-top:1px solid var(--border);margin-top:1rem}
.risk-box{background:var(--amber-lt);border-left:3px solid var(--amber);border-radius:0 var(--radius) var(--radius) 0;padding:8px 12px;font-size:12px;color:var(--amber-dk);margin:.5rem 0}
.plan-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.plan-item{background:var(--bg2);border-radius:var(--radius);padding:6px 9px;font-size:11px;min-width:80px}
.plan-m{font-weight:600;color:var(--pri-dk);font-size:9px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.plan-t{color:var(--text2);font-size:11px;line-height:1.3}
.mp-editor{margin-top:.5rem}
.mp-year-row{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.mp-year-row label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.mp-year-row input[type=number]{width:70px;padding:4px 7px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--bg);color:var(--text);font-family:inherit}
.mp-months{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.75rem}
.mp-month-btn{padding:5px 4px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;font-family:inherit;background:var(--bg3);color:var(--text3);cursor:pointer;text-align:center;transition:all .12s;line-height:1.3}
.mp-month-btn.sel{background:var(--pri-lt);border-color:var(--pri);color:var(--pri-dk);font-weight:500}
.mp-month-rows{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto}
.mp-row{background:var(--bg2);border-radius:var(--radius);padding:8px 10px;border:1px solid transparent}
.mp-row-head{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.mp-row-month{font-size:11px;font-weight:600;color:var(--pri-dk);min-width:72px}
.mp-status-sel{font-size:11px;padding:3px 6px;border:1px solid var(--border);border-radius:5px;background:var(--bg3);color:var(--text);font-family:inherit;cursor:pointer}
.mp-row-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;margin-left:auto;line-height:1;padding:2px 5px;border-radius:4px}
.mp-row-del:hover{color:var(--red);background:var(--red-lt)}
.mp-inp{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;margin-bottom:4px}
.mp-inp:focus{outline:none;border-color:var(--pri)}
.mp-ta{width:100%;padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;resize:vertical;min-height:42px;line-height:1.5}
.mp-ta:focus{outline:none;border-color:var(--pri)}
.mp-lbl{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:500}
.ps-pill{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:500;font-family:'IBM Plex Mono',monospace}
.ps-0{background:#F1EFE8;color:#5F5E5A}
.ps-1{background:#EAF3DE;color:#3B6D11}
.ps-2{background:#FAEEDA;color:#854F0B}
.ps-3{background:#E6F1FB;color:#185FA5}
.ps-4{background:#EEEDFE;color:#534AB7}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-row input[type=range]{flex:1;accent-color:var(--pri)}
.prog-val{font-size:13px;font-weight:500;min-width:36px;font-family:'IBM Plex Mono',monospace}
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:1rem;align-items:flex-start}
.k-col{min-width:210px;flex:1;max-width:260px}
.k-col-hd{display:flex;align-items:center;gap:7px;margin-bottom:9px;padding-bottom:7px}
.k-col-title{font-size:12px;font-weight:500}
.k-cnt{border-radius:10px;padding:1px 7px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.k-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:border-color .12s}
.k-card:hover{border-color:var(--pri)}
.cal-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-bottom:.75rem}
.cal-ml{font-size:10px;color:var(--text3);text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.cal-mb{min-height:86px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:3px;display:flex;flex-direction:column;gap:2px}
.cal-item{font-size:9px;padding:2px 4px;border-radius:3px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.cal-item:hover{opacity:.8}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1.1rem}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.stat-val{font-size:26px;font-weight:600;font-family:'IBM Plex Mono',monospace;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.chart-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem}
.ct-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.9rem}
.chart-wrap{position:relative;height:190px}
.prio-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.prio-lbl{font-size:10px;font-family:'IBM Plex Mono',monospace;width:26px;color:var(--text3);text-align:right}
.prio-bg{flex:1;height:14px;background:var(--bg2);border-radius:3px;overflow:hidden}
.prio-f{height:14px;border-radius:3px}
.prio-n{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;width:18px}
.pw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.pw-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px}
.pw-name{font-size:12px;font-weight:500;margin-bottom:5px}
.pw-bb{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:4px}
.pw-bf{height:4px;border-radius:2px;background:var(--pri)}
.pw-c{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}

/* ── history ── */
.hist-item{border-left:2px solid var(--border);padding:8px 0 8px 14px;margin-bottom:10px;position:relative}
.hist-item::before{content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--pri);border:2px solid var(--bg3)}
.hist-item.created::before{background:var(--blue)}
.hist-date{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:5px}
.hist-row{display:flex;gap:6px;align-items:baseline;font-size:12px;margin-bottom:3px;flex-wrap:wrap}
.hist-field{font-weight:600;color:var(--text);min-width:90px;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
.hist-was{color:var(--text3);text-decoration:line-through;font-size:12px}
.hist-arr{color:var(--text3);font-size:11px}
.hist-now{color:var(--pri-dk);font-size:12px;font-weight:500}
.hist-created{font-size:12px;color:var(--blue-dk);font-weight:500}
/* ── classifier modal ── */
.cls-list{display:flex;flex-direction:column;gap:4px;max-height:320px;overflow-y:auto;margin-bottom:1rem}
.cls-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:var(--radius);font-size:13px}
.cls-item-name{flex:1;color:var(--text)}
.cls-item-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px;color:var(--text3);line-height:1}
.cls-item-btn.edit:hover{color:var(--blue);background:var(--blue-lt)}
.cls-item-btn.del:hover{color:var(--red);background:var(--red-lt)}
.cls-add-row{display:flex;gap:8px}
.cls-add-row input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.cls-add-row input:focus{outline:none;border-color:var(--pri)}
/* ── import modal ── */
.import-drop{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:2rem;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:1rem}
.import-drop:hover,.import-drop.drag{border-color:var(--pri);background:var(--pri-lt)}
.import-drop-icon{font-size:32px;margin-bottom:.5rem}
.import-drop-txt{font-size:13px;color:var(--text3)}
.import-preview{font-size:12px;margin-bottom:1rem}
.import-preview table{width:100%;border-collapse:collapse;font-size:11px}
.import-preview th{background:var(--bg2);padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.import-preview td{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text2)}
.import-stat{background:var(--pri-lt);border-radius:var(--radius);padding:8px 12px;font-size:13px;color:var(--pri-dk);margin-bottom:1rem;font-weight:500}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:880px){.main{grid-template-columns:1fr}.sidebar{display:none}.stats-grid{grid-template-columns:1fr 1fr}.cal-grid{grid-template-columns:repeat(6,1fr)}.charts-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <header>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--pri)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <h1>IT skyriaus užduočių valdymas</h1>
    <span class="sub">2026 m. veiklos planas</span>
    <span id="save-chip" style="font-size:11px;color:var(--pri-dk);background:var(--pri-lt);padding:2px 9px;border-radius:10px;font-family:'IBM Plex Mono',monospace;display:none">● išsaugota</span>

const STORAGE_KEY='it_tasks_v1';

function persist(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));}catch(e){console.warn('save failed',e);return;}
  const chip=document.getElementById('save-chip');
  if(chip){chip.style.display='inline';clearTimeout(chip._t);chip._t=setTimeout(()=>{chip.style.display='none';},2000);}
}
function loadStored(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r);if(Array.isArray(p)&&p.length>0)tasks=p;}}catch(e){}}
function showToast(msg,clr){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;bottom:1.5rem;right:1.5rem;background:${clr||'#0F6E56'};color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-family:'IBM Plex Sans',sans-serif;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .4s`;
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';setTimeout(()=>d.remove(),400);},2500);
}
function resetToDefaults(){
  if(!confirm('Ar tikrai norite grąžinti pradinius duomenis? Visi pakeitimai bus prarasti.'))return;
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  location.reload();
}

function init(){
  loadPersons();

}

  const opts='<option value="">Visi darbuotojai</option>'+persons.map(p=>`<option>${p}</option>`).join('');

}

    if(sba&&t.savininkas!==sba&&t.atsakingas!==sba)return false;
    if(sbt&&t.tipas!==sbt)return false;
    if(sbs&&t.statusas!==sbs)return false;
    if(CF.nr&&!t.nr.toLowerCase().includes(CF.nr.toLowerCase()))return false;
    if(CF.sritis&&t.sritis!==CF.sritis)return false;
    if(CF.veikla&&!t.veikla.toLowerCase().includes(CF.veikla.toLowerCase()))return false;
    if(CF.prioritetas&&String(t.prioritetas)!==CF.prioritetas)return false;
    if(CF.tipas&&t.tipas!==CF.tipas)return false;
    if(CF.savininkas&&t.savininkas!==CF.savininkas)return false;
    if(CF.atsakingas&&t.atsakingas!==CF.atsakingas)return false;
    if(CF.statusas&&t.statusas!==CF.statusas)return false;
    if(CF.eiga){const[lo,hi]=CF.eiga.split('-').map(Number);if(isNaN(hi)?t.eiga<lo:(t.eiga<lo||t.eiga>hi))return false;}
    if(q&&!t.veikla.toLowerCase().includes(q.toLowerCase())&&!t.nr.toLowerCase().includes(q.toLowerCase())&&!t.sritis.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
  if(scol){ftasks.sort((a,b)=>{let av=a[scol],bv=b[scol];return(typeof av==='string'?av.localeCompare(bv):(av-bv))*sdir;});}
  render();
}

function v(id){const e=document.getElementById(id);return e?e.value:'';}
function scf(col,val){CF[col]=val;applyFilters();}
function sort(col){scol===col?sdir*=-1:(scol=col,sdir=1);applyFilters();}
function toggleCF(){showCF=!showCF;render();}
function clearAll(){
  ['sb-a','sb-t','sb-s'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  const e=document.getElementById('ts');if(e)e.value='';
  CF={nr:'',sritis:'',veikla:'',prioritetas:'',tipas:'',savininkas:'',atsakingas:'',statusas:'',eiga:''};
  scol=null;sdir=1;ftasks=[...tasks];render();
}

function switchView(name,el){
  view=name;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');render();
}

function render(){
  const area=document.getElementById('area');
  if(view==='sarasas')area.innerHTML=bList();
  else if(view==='kanban')area.innerHTML=bKanban();
  else if(view==='kalendorius')area.innerHTML=bCal();
  else if(view==='statistika'){area.innerHTML=bStats();setTimeout(drawCharts,80);}
  const s=document.getElementById('ts');if(s)s.addEventListener('input',applyFilters);
}

/* helpers */
function pb(p){const c=p>=10?'b-p10':p>=9?'b-p9':p>=8?'b-p8':p>=7?'b-p7':'b-plow';return`<span class="badge ${c}">${p}</span>`;}
function tb(t){const m={APVIS:'b-apvis',Naujos:'b-naujos',Esamos:'b-esamos',Dokumentacija:'b-doc'};return`<span class="badge ${m[t]||'b-esamos'}">${t}</span>`;}
function sp(s,id){return`<button class="spill s-${SC[s]||'ne'}" onclick="cySt(event,${id})">${s}</button>`;}
function cySt(e,id){e.stopPropagation();const t=tasks.find(x=>x.id===id);const before=JSON.parse(JSON.stringify(t));const i=ST.indexOf(t.statusas);t.statusas=ST[(i+1)%ST.length];recordChange(t,before);persist();applyFilters();}
function uniq(f){return[...new Set(tasks.map(t=>t[f]).filter(Boolean))].sort();}
function si(col){return scol===col?(sdir===1?'↑':'↓'):'↕';}

/* CALENDAR */
function bCal(){
  const clrs=['#378ADD','#1D9E75','#EF9F27','#7F77DD','#E24B4A','#0F6E56','#888780'];
  const cols=MN.map((m,mi)=>{
    const mn=mi+1;const mt=ftasks.filter(t=>t.mp&&t.mp[mn]);
    const items=mt.slice(0,6).map((t,i)=>{const entry=t.mp[mn];const txt=typeof entry==='object'?entry.planas:entry;const st=typeof entry==='object'?entry.statusas:'0';const stClrs={'1':'#1D9E75','2':'#EF9F27','3':'#378ADD','4':'#7F77DD','0':'#888780'};const cl=stClrs[st]||clrs[i%7];return`<div class="cal-item" style="background:${cl}18;color:${cl};border-left:2px solid ${cl}" onclick="openView(${t.id})" title="${t.veikla}: ${txt||''}">${t.nr}</div>`;}).join('');
    const more=mt.length>6?`<div style="font-size:9px;color:var(--text3);text-align:center">+${mt.length-6}</div>`:'';
    return`<div><div class="cal-ml">${m.slice(0,3)}</div><div class="cal-mb">${items||'<div style="font-size:9px;color:var(--border2);text-align:center;padding:6px 0">—</div>'}${more}</div></div>`;
  }).join('');
  return`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem;align-items:center">
    <select class="sb-sel" id="kcA" onchange="applyFilters()" style="width:auto"><option value="">Visi darbuotojai</option>${[...new Set(tasks.flatMap(t=>[t.savininkas,t.atsakingas]).filter(p=>p&&p!=='-'))].sort().map(p=>`<option>${p}</option>`).join('')}</select>
    <select class="sb-sel" id="kcT" onchange="applyFilters()" style="width:auto"><option value="">Visi tipai</option><option>APVIS</option><option>Naujos</option><option>Esamos</option><option>Dokumentacija</option></select>
    <span style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace">${ftasks.filter(t=>Object.keys(t.mp||{}).length>0).length} su mėnesiniu planu</span>
  </div>
  <div class="cal-grid">${cols}</div>
  <div style="font-size:11px;color:var(--text3)">Spausti ant kodo → atidaryti detalę. Kairysis skaičius – mėnesis.</div>`;
}

/* STATS */
function bStats(){
  const n=tasks.length,vy=tasks.filter(t=>t.statusas==='Vykdoma').length,ba=tasks.filter(t=>t.statusas==='Baigta').length,la=tasks.filter(t=>t.statusas==='Laukiama sprendimo').length;
  const avg=Math.round(tasks.reduce((s,t)=>s+t.eiga,0)/n);
  const pg={10:0,9:0,8:0,7:0,low:0};
  tasks.forEach(t=>{if(t.prioritetas>=10)pg[10]++;else if(t.prioritetas>=9)pg[9]++;else if(t.prioritetas>=8)pg[8]++;else if(t.prioritetas>=7)pg[7]++;else pg.low++;});
  const mp=Math.max(...Object.values(pg));
  const pc={10:'#A32D2D',9:'#854F0B',8:'#185FA5',7:'#3B6D11',low:'#5F5E5A'},pl={10:'P10',9:'P9',8:'P8',7:'P7',low:'≤P4'};
  const prioR=Object.entries(pg).map(([k,v])=>`<div class="prio-row"><span class="prio-lbl" style="color:${pc[k]}">${pl[k]}</span><div class="prio-bg"><div class="prio-f" style="width:${Math.round((v/mp)*100)}%;background:${pc[k]}"></div></div><span class="prio-n">${v}</span></div>`).join('');
  const pers={};tasks.forEach(t=>{[t.savininkas,t.atsakingas].forEach(p=>{if(p&&p!=='-')pers[p]=(pers[p]||0)+1;});});
  const mxP=Math.max(...Object.values(pers));
  const pwC=Object.entries(pers).sort((a,b)=>b[1]-a[1]).slice(0,14).map(([nm,c])=>`<div class="pw-card"><div class="pw-name">${nm}</div><div class="pw-bb"><div class="pw-bf" style="width:${Math.round((c/mxP)*100)}%"></div></div><div class="pw-c">${c} rol.</div></div>`).join('');
  return`<div class="stats-grid">
    <div class="stat-card"><div class="stat-lbl">Iš viso</div><div class="stat-val">${n}</div><div class="stat-sub">užduočių</div></div>
    <div class="stat-card"><div class="stat-lbl">Vykdomos</div><div class="stat-val" style="color:var(--blue)">${vy}</div><div class="stat-sub">${Math.round(vy/n*100)}% viso</div></div>
    <div class="stat-card"><div class="stat-lbl">Laukia sprendimo</div><div class="stat-val" style="color:var(--amber)">${la}</div><div class="stat-sub">reikia vadovybės</div></div>
    <div class="stat-card"><div class="stat-lbl">Vid. eiga</div><div class="stat-val">${avg}%</div><div class="stat-sub">${ba} baigtos</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><div class="ct-title">Pagal realizavimo tipą</div><div class="chart-wrap"><canvas id="ct"></canvas></div></div>
    <div class="chart-card"><div class="ct-title">Pagal statusą</div><div class="chart-wrap"><canvas id="cs"></canvas></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">
    <div class="chart-card"><div class="ct-title">Pagal prioritetą</div><div style="margin-top:.25rem">${prioR}</div></div>
    <div class="chart-card"><div class="ct-title">Darbuotojų rolės</div><div class="pw-grid" style="margin-top:0">${pwC}</div></div>
  </div>`;
}
function drawCharts(){
  if(chartT){chartT.destroy();chartT=null;}if(chartS){chartS.destroy();chartS=null;}
  const tip={},sta={};tasks.forEach(t=>{tip[t.tipas]=(tip[t.tipas]||0)+1;sta[t.statusas]=(sta[t.statusas]||0)+1;});
  const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:7,boxWidth:10,boxHeight:10}}}};
  chartT=new Chart(document.getElementById('ct'),{type:'doughnut',data:{labels:Object.keys(tip),datasets:[{data:Object.values(tip),backgroundColor:['#378ADD','#1D9E75','#888780','#EF9F27','#7F77DD'],borderWidth:0}]},options:o});
  chartS=new Chart(document.getElementById('cs'),{type:'doughnut',data:{labels:Object.keys(sta),datasets:[{data:Object.values(sta),backgroundColor:Object.keys(sta).map(s=>STC[s]||'#888'),borderWidth:0}]},options:o});
}

let tempMp={};

function mpRowHtml(mNum,entry){
  const mo=typeof entry==='object'?entry:{planas:entry,statusas:'0',komentaras:''};
  return`<div class="mp-row" id="mprow-${mNum}">
    <div class="mp-row-head">

      <select class="mp-status-sel" onchange="tempMp[${mNum}].statusas=this.value">

      </select>
      <button class="mp-row-del" onclick="mpRemoveRow(${mNum})" title="Pašalinti mėnesį">×</button>
    </div>
    <div class="mp-lbl">Planas</div>
    <input class="mp-inp" value="${(mo.planas||'').replace(/"/g,'&quot;')}" placeholder="Mėnesio veiklos aprašas..." oninput="tempMp[${mNum}].planas=this.value">

  </div>`;

function mpRemoveRow(mNum){
  delete tempMp[mNum];
  const el=document.getElementById('mprow-'+mNum);
  if(el)el.remove();
  // unselect month button
  const btn=document.getElementById('mpbtn-'+mNum);
  if(btn)btn.classList.remove('sel');
}

function mpToggleMonth(mNum){
  const btn=document.getElementById('mpbtn-'+mNum);
  if(tempMp[mNum]!==undefined){
    mpRemoveRow(mNum);
  } else {
    tempMp[mNum]={planas:'',statusas:'0',komentaras:''};
    btn.classList.add('sel');
    const rows=document.getElementById('mp-rows');
    // insert in month order
    const sortedKeys=Object.keys(tempMp).map(Number).sort((a,b)=>a-b);
    const idx=sortedKeys.indexOf(mNum);
    const newHtml=mpRowHtml(mNum,tempMp[mNum]);
    if(idx===sortedKeys.length-1){
      rows.insertAdjacentHTML('beforeend',newHtml);
    } else {
      const nextKey=sortedKeys[idx+1];
      const nextEl=document.getElementById('mprow-'+nextKey);
      if(nextEl) nextEl.insertAdjacentHTML('beforebegin',newHtml);
      else rows.insertAdjacentHTML('beforeend',newHtml);
    }
  }
}

function saveTask(id){
  const v=g('n-v');if(!v.trim()){alert('Įveskite veiklos pavadinimą');return;}
  // collect tempMp (monthly plan editor state)
  const mp={};
  Object.entries(tempMp).forEach(([k,val])=>{
    const mNum=parseInt(k);
    // read live input values from DOM if still open
    const inp=document.querySelector(`#mprow-${mNum} .mp-inp`);
    const ta=document.querySelector(`#mprow-${mNum} .mp-ta`);
    const sel=document.querySelector(`#mprow-${mNum} .mp-status-sel`);
    mp[mNum]={
      planas: inp?inp.value:(val.planas||''),
      statusas: sel?sel.value:(val.statusas||'0'),
      komentaras: ta?ta.value:(val.komentaras||'')
    };
  });
  let savedId=id;
  if(id&&id!=='null'){
    const t=tasks.find(x=>x.id===id);
    const before=JSON.parse(JSON.stringify(t));
    t.nr=g('n-nr')||t.nr;t.veikla=v;t.sritis=g('n-sr')||'—';
    t.prioritetas=parseInt(g('n-p'))||0;t.tipas=g('n-t');
    t.savininkas=g('n-sv')||'—';t.atsakingas=g('n-at')||'—';
    t.statusas=g('n-st');t.eiga=parseInt(g('n-ei'))||0;
    t.rizika=g('n-r');t.mp=mp;
    recordChange(t,before);
  }else{
    const nid=Math.max(...tasks.map(t=>t.id))+1;
    savedId=nid;
    const newTask={id:nid,nr:g('n-nr')||String(nid),sritis:g('n-sr')||'—',veikla:v,prioritetas:parseInt(g('n-p'))||5,tipas:g('n-t'),savininkas:g('n-sv')||'—',atsakingas:g('n-at')||'—',statusas:g('n-st'),eiga:parseInt(g('n-ei'))||0,komentarai:[],rizika:g('n-r'),mp,istorija:[{data:new Date().toISOString(),pakeitimai:[{laukas:'_sukurta',buvo:null,tapo:null}]}]};
    tasks.push(newTask);
  }
  persist();ftasks=[...tasks];applyFilters();showToast(id&&id!=='null'?'Išsaugota ✓':'Užduotis sukurta ✓');
  // after save: stay open but switch to view mode
  if(savedId&&savedId!=='null') openView(savedId);
}

const FIELD_LABELS={
  nr:'Nr.',veikla:'Veikla',sritis:'Sritis',prioritetas:'Prioritetas',
  tipas:'Tipas',savininkas:'Savininkas',atsakingas:'Atsakingas',
  statusas:'Statusas',eiga:'Eiga',rizika:'Rizika',mp:'Mėn. planas'
};

function diffTask(before,after){
  const changes=[];
  const watch=['nr','veikla','sritis','prioritetas','tipas','savininkas','atsakingas','statusas','eiga','rizika'];
  watch.forEach(f=>{
    const bv=before[f],av=after[f];
    if(String(bv)!==String(av))changes.push({laukas:f,buvo:bv,tapo:av});
  });
  // mp diff — check added/removed months
  const bmp=before.mp||{},amp=after.mp||{};
  const allKeys=[...new Set([...Object.keys(bmp),...Object.keys(amp)])];
  const mpChanges=[];
  allKeys.forEach(k=>{
    const bv=bmp[k],av=amp[k];
    if(JSON.stringify(bv)!==JSON.stringify(av)){
      if(!bv) mpChanges.push(`Pridėtas: ${MN[parseInt(k)-1]}`);
      else if(!av) mpChanges.push(`Pašalintas: ${MN[parseInt(k)-1]}`);
      else{
        const bp=typeof bv==='object'?bv.planas:bv;
        const ap=typeof av==='object'?av.planas:av;
        const bs=typeof bv==='object'?bv.statusas:'0';
        const as_=typeof av==='object'?av.statusas:'0';
        if(bp!==ap||bs!==as_) mpChanges.push(`${MN[parseInt(k)-1]}: atnaujinta`);
      }
    }
  });
  if(mpChanges.length) changes.push({laukas:'mp',buvo:null,tapo:mpChanges.join(', ')});
  return changes;
}

function recordChange(task,before){
  const changes=diffTask(before,task);
  if(!changes.length)return;
  if(!task.istorija)task.istorija=[];
  task.istorija.unshift({data:new Date().toISOString(),pakeitimai:changes});
}

function formatHistVal(field,val){
  if(val===null||val===undefined||val==='')return'—';
  if(field==='eiga')return val+'%';
  return String(val);
}

function renderHistoryPane(t){
  const hist=t.istorija||[];
  if(!hist.length)return'<div style="font-size:12px;color:var(--text3);font-style:italic;padding:.5rem 0">Pakeitimų istorija tuščia</div>';
  return hist.map(h=>{
    const d=new Date(h.data);
    const dateStr=d.toLocaleDateString('lt-LT')+' '+d.toLocaleTimeString('lt-LT',{hour:'2-digit',minute:'2-digit'});
    const isSukurta=h.pakeitimai.length===1&&h.pakeitimai[0].laukas==='_sukurta';
    if(isSukurta)return`<div class="hist-item created"><div class="hist-date">${dateStr}</div><div class="hist-created">✦ Užduotis sukurta</div></div>`;
    const rows=h.pakeitimai.map(p=>{
      if(p.laukas==='mp')return`<div class="hist-row"><span class="hist-field">${FIELD_LABELS[p.laukas]||p.laukas}</span><span class="hist-now">${p.tapo}</span></div>`;
      return`<div class="hist-row"><span class="hist-field">${FIELD_LABELS[p.laukas]||p.laukas}</span><span class="hist-was">${formatHistVal(p.laukas,p.buvo)}</span><span class="hist-arr">→</span><span class="hist-now">${formatHistVal(p.laukas,p.tapo)}</span></div>`;
    }).join('');
    return`<div class="hist-item"><div class="hist-date">${dateStr}</div>${rows}</div>`;
  }).join('');
}

function clsAdd(){
  const inp=document.getElementById('cls-new');
  const name=(inp?.value||'').trim();
  if(!name)return;
  if(persons.includes(name)){showToast('Toks darbuotojas jau yra','#888780');return;}
  persons.push(name);
  persons.sort();
  savePersons();
  rebuildPersonSelect();
  renderClassifierModal();
  showToast('Darbuotojas pridėtas ✓');
}

function clsDel(i){
  const name=persons[i];
  const used=tasks.filter(t=>t.savininkas===name||t.atsakingas===name).length;
  const msg=used>0
    ? `Ištrinti "${name}" iš sąrašo?

Dėmesio: šis darbuotojas priskirtas ${used} užduočiai(-s). Užduotyse vardas išliks, tačiau nebus klasifikatoriaus sąraše.`
    : `Ištrinti "${name}" iš sąrašo?`;
  if(!confirm(msg))return;
  persons.splice(i,1);
  savePersons();
  rebuildPersonSelect();
  renderClassifierModal();
  showToast('Pašalinta','#888780');
}

function clsEdit(i){
  const oldName=persons[i];
  const name=prompt('Redaguoti vardą:',oldName);
  if(!name||!name.trim()||name.trim()===oldName)return;
  const newName=name.trim();
  persons[i]=newName;
  persons.sort();
  savePersons();
  // sync tasks — update savininkas, atsakingas, komentarai authors
  let updCount=0;
  tasks.forEach(t=>{
    let changed=false;
    if(t.savininkas===oldName){t.savininkas=newName;changed=true;}
    if(t.atsakingas===oldName){t.atsakingas=newName;changed=true;}
    t.komentarai.forEach(c=>{if(c.autorius===oldName){c.autorius=newName;changed=true;}});
    if(changed)updCount++;
  });
  if(updCount>0){persist();ftasks=[...tasks];applyFilters();}
  rebuildPersonSelect();
  renderClassifierModal();
  showToast(updCount>0?`Atnaujinta ✓ (pakeista ${updCount} užduotyse)`:'Atnaujinta ✓');
}

function handleXlsx(input){
  if(input.files[0])handleXlsxFile(input.files[0]);
  input.value='';
}

function handleXlsxFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      // try "Visi" sheet first, fallback to first sheet
      const sheetName=wb.SheetNames.includes('Visi')?'Visi':wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      parseXlsxRows(rows,sheetName);
    }catch(err){
      document.getElementById('import-preview-area').innerHTML=`<div style="color:var(--red);font-size:13px;padding:.5rem 0">Klaida skaitant failą: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseXlsxRows(rows,sheetName){
  const existingNrs=new Set(tasks.map(t=>String(t.nr).trim().toLowerCase()));
  xlPreviewRows=[];
  rows.forEach((row,idx)=>{
    // map columns
    const mapped={};
    Object.entries(row).forEach(([col,val])=>{
      const trimCol=col.trim();
      const field=XL_MAP[trimCol]||Object.entries(XL_MAP).find(([k])=>trimCol.includes(k.replace(/​/g,'')))?.[1];
      if(field&&val!==''&&val!==null&&val!==undefined)mapped[field]=String(val).trim();
    });
    if(!mapped.veikla||!String(mapped.veikla).trim())return; // skip empty rows
    const nr=String(mapped.nr||'').trim();
    const isNew=!nr||!existingNrs.has(nr.toLowerCase());
    if(isNew) xlPreviewRows.push({...mapped, _rowIdx:idx});
  });

  const preview=xlPreviewRows.slice(0,8).map(r=>`
    <tr>
      <td>${r.nr||'—'}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.veikla||'—'}</td>
      <td>${r.prioritetas||'—'}</td>
      <td>${r.savininkas||'—'}</td>
      <td>${r.atsakingas||'—'}</td>
    </tr>`).join('');
  const more=xlPreviewRows.length>8?`<tr><td colspan="5" style="color:var(--text3);font-style:italic">... ir dar ${xlPreviewRows.length-8} eilučių</td></tr>`:'';

  document.getElementById('import-preview-area').innerHTML=xlPreviewRows.length?`
    <div class="import-stat">✓ Rasta ${xlPreviewRows.length} naujų įrašų (lapa: "${sheetName}")</div>
    <div class="import-preview">
      <table>
        <thead><tr><th>Nr.</th><th>Veikla</th><th>Prior.</th><th>Savininkas</th><th>Atsakingas</th></tr></thead>
        <tbody>${preview}${more}</tbody>
      </table>
    </div>`
    :`<div style="background:var(--amber-lt);border-radius:var(--radius);padding:8px 12px;font-size:13px;color:var(--amber-dk);margin-bottom:1rem">Nerasta naujų įrašų — visi Nr. jau egzistuoja arba failas tuščias.</div>`;

  document.getElementById('import-footer').innerHTML=`
    <div style="font-size:11px;color:var(--text3)">Importuojami tik nauji įrašai (pagal Nr.)</div>
    <div class="mf-r">
      <button class="btn-sec" onclick="closeM()">Atšaukti</button>
      ${xlPreviewRows.length?`<button class="btn-pri" onclick="doImport()">⬆ Importuoti ${xlPreviewRows.length} įrašų</button>`:''}
    </div>`;
}

function doImport(){
  if(!xlPreviewRows.length)return;
  let maxId=Math.max(...tasks.map(t=>t.id),0);
  let added=0;
  xlPreviewRows.forEach(r=>{
    maxId++;
    const newTask={
      id:maxId,
      nr:r.nr||String(maxId),
      sritis:r.sritis||'—',
      veikla:r.veikla||'—',
      prioritetas:parseInt(r.prioritetas)||0,
      tipas:r.tipas||'Esamos',
      savininkas:r.savininkas||'—',
      atsakingas:r.atsakingas||'—',
      statusas:'Nepradėta',
      eiga:0,
      komentarai:[],
      rizika:r.rizika||'',
      mp:{},
      istorija:[{data:new Date().toISOString(),pakeitimai:[{laukas:'_sukurta',buvo:null,tapo:'Importuota iš Excel'}]}]
    };
    tasks.push(newTask);
    added++;
  });
  persist();
  ftasks=[...tasks];
  applyFilters();
  closeM();
  showToast(`Importuota ${added} naujų užduočių ✓`);
  xlPreviewRows=[];
}

init();
</script>
<input type="file" id="xlsx-input" accept=".xlsx,.xls" style="display:none" onchange="handleXlsx(this)">
</body>
</html>
